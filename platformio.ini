; PlatformIO Project Configuration File
; Three build targets — same firmware logic, board-specific display/touch layer.
;   waveshare_amoled_164   : Waveshare ESP32-S3-Touch-AMOLED-1.64 (CO5300 QSPI, 280x456)
;   waveshare_touch_lcd_2  : Waveshare ESP32-S3-Touch-LCD-2 (ST7789T3 SPI, 240x320)
;   lilygo_t_qt            : LILYGO T-QT Pro S3 (GC9A01 SPI, 128x128)
;
; ┌─────────────────────────────────────────────────────────────────────────┐
; │  ACTIVE BOARD — change this one line before Build / Upload             │
; │                                                                         │
; │  default_envs = waveshare_amoled_164                                   │
; │  default_envs = waveshare_touch_lcd_2                                  │
; │  default_envs = lilygo_t_qt                                            │
; └─────────────────────────────────────────────────────────────────────────┘

[platformio]
default_envs = waveshare_touch_lcd_2

; ---------------------------------------------------------------------------
; Shared lib deps — referenced by both environments below
; ---------------------------------------------------------------------------
[shared]
lib_deps =
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bblanchon/ArduinoJson @ ^7.0.0
    https://github.com/GordonAnderson/GAACE_Core.git

; ---------------------------------------------------------------------------
; Waveshare ESP32-S3-Touch-AMOLED-1.64
; ---------------------------------------------------------------------------
[env:waveshare_amoled_164]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board        = esp32-s3-devkitc-1
framework    = arduino
custom_name  = VacuumGauge

board_build.usb_product            = VacuumGauge
board_vendor                       = GAA Custom Electronics, LLC
board_build.flash_mode             = qio
board_build.flash_size             = 16MB
board_upload.flash_size            = 16MB
board_build.arduino.memory_type    = qio_opi
board_build.partitions             = default_16MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBOARD_WAVESHARE_AMOLED
    -DBOARD_WAVESHARE

lib_deps =
    moononournation/GFX Library for Arduino @ ^1.4.9
    ${shared.lib_deps}

extra_scripts =
    pre:patch_libs.py
    post:rename_firmware.py

; ---------------------------------------------------------------------------
; Waveshare ESP32-S3-Touch-LCD-2 (ST7789T3 SPI, 240x320)
; ---------------------------------------------------------------------------
[env:waveshare_touch_lcd_2]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board        = esp32-s3-devkitc-1
framework    = arduino
custom_name  = VacuumGauge

board_build.usb_product            = VacuumGauge
board_vendor                       = GAA Custom Electronics, LLC
board_build.flash_mode             = qio
board_build.flash_size             = 16MB
board_upload.flash_size            = 16MB
board_build.arduino.memory_type    = qio_opi
board_build.partitions             = default_16MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBOARD_WAVESHARE_LCD2
    -DBOARD_WAVESHARE

lib_deps =
    moononournation/GFX Library for Arduino @ ^1.4.9
    ${shared.lib_deps}

extra_scripts =
    pre:patch_libs.py
    post:rename_firmware.py

; ---------------------------------------------------------------------------
; LILYGO T-QT Pro S3 (Gordon's board)
; ---------------------------------------------------------------------------
[env:lilygo_t_qt]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board        = lilygo-t3-s3
framework    = arduino
custom_name  = VacuumGauge

board_build.usb_product = VacuumGauge
board_vendor            = GAA Custom Electronics, LLC

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_LILYGO_TQT
    -DUSER_SETUP_LOADED

lib_deps =
    https://github.com/Bodmer/TFT_eSPI.git#v2.5.33
    ${shared.lib_deps}

extra_scripts =
    pre:patch_libs.py
    post:rename_firmware.py
